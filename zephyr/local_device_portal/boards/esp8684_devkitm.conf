# Board-specific settings for ESP32-C2 class ESP8684-DevKitM boards.
#
# Keep this file available for ESP32-C2-only overrides while the shared app
# config remains in prj.conf.

# ESP32-C2 class parts have less SRAM than ESP-WROOM-32 and ESP32-C6 boards.
# Keep the same AP+STA portal behavior, but use smaller pools and production
# logging defaults for this board.
CONFIG_ASSERT=n
CONFIG_LOG=n
CONFIG_NET_LOG=n
CONFIG_NET_DHCPV4_SERVER_LOG_LEVEL_DBG=n

CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_NET_MGMT_EVENT_STACK_SIZE=2048
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=2048
CONFIG_NET_TCP_WORKQ_STACK_SIZE=1536

CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=4
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=24
CONFIG_NET_BUF_TX_COUNT=24
CONFIG_NET_MAX_CONTEXTS=10
CONFIG_NET_IF_MCAST_IPV4_ADDR_COUNT=1
CONFIG_NET_DHCPV4_SERVER_ADDR_COUNT=2

CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=4
CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM=12
CONFIG_ESP32_WIFI_DYNAMIC_TX_BUFFER_NUM=12
CONFIG_ESP32_WIFI_RX_MGMT_BUF_NUM_DEF=3
CONFIG_ESP32_WIFI_MGMT_SBUF_NUM=12
CONFIG_ESP32_WIFI_TX_BA_WIN=2
CONFIG_ESP32_WIFI_RX_BA_WIN=2

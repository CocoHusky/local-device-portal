# Board-specific settings for ESP-WROOM-32 style development boards.
#
# Keep this file available for ESP32-only overrides while the shared app config
# remains in prj.conf.

# Some ESP-WROOM-32 modules report ESP32 chip revision v1.0. Zephyr warns that
# this revision is unsupported unless the application explicitly opts in.
CONFIG_ESP32_USE_UNSUPPORTED_REVISION=y

# Keep WROOM on the stable direct-IP setup portal path first.
CONFIG_DNS_RESOLVER=n
CONFIG_DNS_SERVER_IP_ADDRESSES=n
CONFIG_MDNS_RESPONDER=n
CONFIG_LLMNR_RESPONDER=n

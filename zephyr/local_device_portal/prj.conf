# Local Device Portal Zephyr MVP
#
# Wi-Fi/AP-STA configuration is based on Zephyr's official
# samples/net/wifi/apsta_mode sample. The Arduino sketch remains the UI and
# behavior reference, but Zephyr must use Zephyr networking APIs.

CONFIG_MAIN_STACK_SIZE=3072
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3072
CONFIG_HEAP_MEM_POOL_SIZE=16384

CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_ASSERT=y
CONFIG_HWINFO=y
CONFIG_REBOOT=y

# ESP32-WROOM rev v1.0 is reported by Zephyr as unsupported unless this is set.
CONFIG_ESP32_USE_UNSUPPORTED_REVISION=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=10
CONFIG_NET_MGMT_EVENT_STACK_SIZE=3072
CONFIG_NET_PKT_RX_COUNT=48
CONFIG_NET_PKT_TX_COUNT=48
CONFIG_NET_BUF_RX_COUNT=96
CONFIG_NET_BUF_TX_COUNT=96
CONFIG_NET_MAX_CONTEXTS=24
CONFIG_NET_IF_MAX_IPV4_COUNT=2
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=4096
CONFIG_NET_TC_TX_COUNT=1
CONFIG_NET_TCP_TIME_WAIT_DELAY=0

# Wi-Fi management
CONFIG_WIFI=y
# Use direct net_mgmt Wi-Fi calls only. Do not run Wi-Fi Network Manager while
# this app manually enables AP mode, assigns AP IPv4, and starts DHCP/HTTP.
CONFIG_WIFI_NM=n
CONFIG_WIFI_USAGE_MODE_STA_AP=y
CONFIG_NET_L2_WIFI_MGMT=y

# DHCP server for setup AP clients
CONFIG_NET_DHCPV4=y
CONFIG_NET_DHCPV4_SERVER=y
CONFIG_NET_DHCPV4_SERVER_ADDR_COUNT=8
CONFIG_NET_DHCPV4_SERVER_ICMP_PROBE_TIMEOUT=0

# Persistent credential storage
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# Hostname shown in the UI; mDNS behavior depends on platform support.
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME="mmwave"

# Keep libc features available for string/page formatting.
CONFIG_NEWLIB_LIBC=y
CONFIG_MINIMAL_LIBC=n

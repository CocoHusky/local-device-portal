<svg xmlns='http://www.w3.org/2000/svg' width='900' height='760' viewBox='0 0 900 760' role='img' aria-label='Portal dashboard screen with sanitized online data'><defs><linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'><stop stop-color='#06101c'/><stop offset='1' stop-color='#010409'/></linearGradient><style>.t{font-family:Inter,Segoe UI,Arial,sans-serif}.muted{fill:#8fa3bd}.white{fill:#f8fafc}.green{fill:#4ade80}.card{fill:#0d1727;stroke:#1f5571;stroke-width:2}.line{stroke:#26344f;stroke-width:2}.cap{font-size:20px;font-weight:800;letter-spacing:.18em}.h{font-size:40px;font-weight:900}.label{font-size:27px}.val{font-size:27px;font-weight:800}.box{fill:#062314;stroke:#14532d;stroke-width:2}</style></defs><rect width='900' height='760' fill='url(#bg)'/><g class='t'><rect x='34' y='34' width='832' height='250' rx='30' class='card'/><text x='78' y='92' class='muted cap'>DASHBOARD</text><text x='78' y='150' class='white h'>Sensor ready</text><rect x='78' y='178' width='744' height='62' rx='20' class='box'/><text x='105' y='219' class='green' font-size='27'>Connected on local Wi-Fi.</text><text x='78' y='266' class='muted label'>Dashboard: mmwave-xxxxxx.local</text><rect x='34' y='320' width='832' height='160' rx='30' class='card'/><text x='78' y='378' class='muted cap'>DEVICE DATA</text><text x='78' y='432' class='muted label'>Uptime</text><text x='822' y='432' text-anchor='end' class='white val'>0h 5m 24s</text><line x1='78' y1='455' x2='822' y2='455' class='line'/><text x='78' y='510' class='muted label'>RSSI</text><text x='822' y='510' text-anchor='end' class='white val'>-54 dBm</text><rect x='34' y='525' width='832' height='200' rx='30' class='card'/><text x='78' y='583' class='muted cap'>ONLINE DATA</text><rect x='78' y='610' width='744' height='62' rx='20' class='box'/><text x='105' y='651' class='green' font-size='27'>Device internet OK</text><text x='78' y='705' class='muted label'>Location, public IP, and time are redacted.</text></g></svg>
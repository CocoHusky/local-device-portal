<svg xmlns='http://www.w3.org/2000/svg' width='900' height='760' viewBox='0 0 900 760' role='img' aria-label='Portal scan results screen showing sanitized Wi-Fi networks'><defs><linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'><stop stop-color='#06101c'/><stop offset='1' stop-color='#010409'/></linearGradient><linearGradient id='bar' x1='0' y1='0' x2='1' y2='0'><stop stop-color='#00b8f0'/><stop offset='1' stop-color='#00d97e'/></linearGradient><style>.t{font-family:Inter,Segoe UI,Arial,sans-serif}.muted{fill:#8fa3bd}.white{fill:#f8fafc}.card{fill:#0d1727;stroke:#1f5571;stroke-width:2}.net{fill:#07101f;stroke:#243852;stroke-width:2}.cap{font-size:20px;font-weight:800;letter-spacing:.18em}.h{font-size:42px;font-weight:900}.name{font-size:30px;font-weight:900}.meta{font-size:23px;font-weight:700}</style></defs><rect width='900' height='760' fill='url(#bg)'/><g class='t'><text x='55' y='70' class='white h'>Choose Wi‑Fi</text><text x='55' y='112' class='muted' font-size='26'>Sanitized scan results from nearby networks.</text><rect x='55' y='150' width='790' height='120' rx='24' class='net'/><text x='92' y='203' class='white name'>Home‑Network</text><text x='760' y='203' text-anchor='end' class='muted meta'>🔒</text><text x='92' y='240' class='muted meta'>Good</text><text x='760' y='240' text-anchor='end' class='muted meta'>‑61 dBm</text><rect x='92' y='252' width='690' height='14' rx='7' fill='#26344f'/><rect x='92' y='252' width='505' height='14' rx='7' fill='url(#bar)'/><rect x='55' y='300' width='790' height='120' rx='24' class='net'/><text x='92' y='353' class='white name'>Lab‑WiFi</text><text x='760' y='353' text-anchor='end' class='muted meta'>🔒</text><text x='92' y='390' class='muted meta'>Fair</text><text x='760' y='390' text-anchor='end' class='muted meta'>‑72 dBm</text><rect x='92' y='402' width='690' height='14' rx='7' fill='#26344f'/><rect x='92' y='402' width='355' height='14' rx='7' fill='url(#bar)'/><rect x='55' y='450' width='790' height='120' rx='24' class='net'/><text x='92' y='503' class='white name'>Guest‑Network</text><text x='760' y='503' text-anchor='end' class='muted meta'>🔒</text><text x='92' y='540' class='muted meta'>Weak</text><text x='760' y='540' text-anchor='end' class='muted meta'>‑82 dBm</text><rect x='92' y='552' width='690' height='14' rx='7' fill='#26344f'/><rect x='92' y='552' width='245' height='14' rx='7' fill='url(#bar)'/><rect x='55' y='615' width='790' height='56' rx='17' class='card'/><text x='450' y='652' text-anchor='middle' class='muted' font-size='30' font-weight='900'>Scan again</text><rect x='55' y='690' width='790' height='56' rx='17' class='card'/><text x='450' y='727' text-anchor='middle' class='muted' font-size='30' font-weight='900'>Type network manually</text></g></svg>